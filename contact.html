<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sophie | Cloud Engineer ☁️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HERO -->
  <header class="hero">
    <h1>
      Building cloud projects that are<br>
      <span>simple, reliable & fun ☁️</span>
    </h1>
    <p class="tagline">
      Aspiring Cloud Engineer who enjoys turning ideas into real systems ✨
    </p>
       
  </header>

  <!-- ACTUAL CONTACT FORM -->

   <div class="project-links">
      <a href="https://sophieworld.dev">🌍 Home</a>
      <a href="https://github.com/User10538">💻 GitHub</a>
      <a href="/contact.html">📬 Contact Me</a>
    </div>

    <section class="projects">
    <h2>💌 Contact ME</h2>

<div class="projects-container">
  <div class="project-card">
        <form id="contactForm">
          <p><input type="text" name="name" placeholder="Your Name" required /></p>
          <input type="email" name="email" placeholder="Your Email" required /><br><br>
          <textarea name="message" placeholder="Your Message" required aria-setsize="32"></textarea><br><br>
              <button type="submit">Send</button>
            </form>
            
            <p id="responseMsg"></p>

  <script>
    const form = document.getElementById("contactForm");
    const responseMsg = document.getElementById("responseMsg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      const data = {
        name: formData.get("name"),
        email: formData.get("email"),
        message: formData.get("message")
      };

      try {
        const res = await fetch("https://za4ajp5sa6.execute-api.us-east-1.amazonaws.com/contact", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const text = await res.text();
        let result;

        try {
          result = JSON.parse(text);
        } catch {
          result = { error: text };
        }

        if (res.status === 200) {
          responseMsg.innerText = "✅ Message sent!";
          form.reset();
        } else {
          responseMsg.innerText = "❌ " + result.error;
        }

      } catch (err) {
        responseMsg.innerText = "❌ Something went wrong";
      }
    });
  </script>

  <!-- FOOTER -->
  <footer>
    <p>Made with ☁️ + ✨ by Sophie</p>
  </footer>

  <!-- SCROLL ANIMATION -->
  <script>
    const elements = document.querySelectorAll("section");

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("show");
        }
      });
    });

    elements.forEach(el => {
      el.classList.add("fade-in");
      observer.observe(el);
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Sophie | Security Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css?v=2">
</head>

<body>

  <!-- HEADER -->
  <div id="header"></div>

<main style="padding: 2rem;">

  <h1></h1>

 

</main>


<section class="architecture-preview">

  <div class="architecture-card">

    <h2>Security Dashboard</h2>    

    <div class="architecture-tags">
      <p>
       <div style="text-align: center;"><button onclick="loadEvents()">Load Events</button>

        <ul id="events"></ul>
        </div>
    </p>
  </div>
</div>

</section>
  <!-- FOOTER -->
  <div id="footer"></div>

  <script>

    // Load security events
    async function loadEvents() {

      const res = await fetch(
        "https://za4ajp5sa6.execute-api.us-east-1.amazonaws.com/security-events"
      );

      const data = await res.json();

      const list = document.getElementById("events");

      list.innerHTML = "";

      data.forEach(event => {

        const li = document.createElement("li");

        li.innerText =
          `${event.timestamp} | ${event.ip} | ${event.userAgent}`;

        list.appendChild(li);

      });
    }

    // Load Header
    fetch('/components/header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header').innerHTML = data;
      });

    // Load Footer
    fetch('/components/footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer').innerHTML = data;
      });

  </script>

</body>

</html>
